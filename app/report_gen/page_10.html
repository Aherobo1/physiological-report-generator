<div class="w-full page bg-white">

        <!-- Title -->
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">
            Fuel Utilization Report - Institute of Science, Health and
            Performance
        </h1>

        <!-- Fuel Utilization Chart -->
        <div class="w-full max-w-5xl">
            <img
